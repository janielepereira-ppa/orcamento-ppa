<style>
:root{--verde-escuro:#003C37;--verde-medio:#496D3A;--verde-lima:#B2C84B;--azul:#2792A1;--dow:#E31937;--cinza:#f4f6f4;--texto:#20302b;--borda:#e2e8e2;--ok:#496D3A;--alerta:#c9863b;--erro:#b0413e;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Poppins',sans-serif;color:var(--texto);background:var(--cinza);line-height:1.4}
.wrap{max-width:1180px;margin:0 auto;padding:0 20px 60px}
header{background:linear-gradient(120deg,var(--verde-escuro),var(--verde-medio));color:#fff;padding:30px 0 28px;margin-bottom:26px}
header .wrap{padding-bottom:0;display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap}
.eyebrow{font-size:12px;letter-spacing:2.5px;text-transform:uppercase;color:var(--verde-lima);font-weight:600}
h1{font-size:29px;font-weight:600;margin:6px 0 4px}
.sub{font-size:14px;opacity:.85;font-weight:300}
.ppa-logo{height:62px;flex:none}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;margin:24px 0 4px}
.tabs{display:flex;gap:10px}
.tab{border:none;cursor:pointer;font-family:inherit;font-size:15px;font-weight:500;padding:11px 26px;border-radius:30px;background:#fff;color:var(--texto);border:1.5px solid var(--borda);transition:.15s}
.tab.on{color:#fff;border-color:transparent}
.tab .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:8px;vertical-align:middle}
.dl{display:flex;gap:8px}
.dl button{cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;padding:9px 16px;border-radius:24px;border:1.5px solid var(--borda);background:#fff;color:var(--verde-escuro);transition:.15s}
.dl button:hover{background:var(--verde-lima)}
.dl button:disabled{opacity:.5;cursor:wait}
.banner{display:flex;align-items:center;gap:18px;background:#fff;border:1px solid var(--borda);border-radius:14px;padding:16px 22px;margin-top:20px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.banner img{height:44px}
.banner .pl{border-left:2px solid var(--borda);padding-left:18px}
.banner .pl .p1{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#8a938c;font-weight:600}
.banner .pl .p2{font-size:17px;font-weight:600;color:var(--verde-escuro)}
.banner .dowtag{font-size:26px;font-weight:700;color:var(--dow);letter-spacing:.5px}
.cycle{background:#fff;border:1px solid var(--borda);border-radius:16px;padding:24px 26px;margin-top:18px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.cycle-head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;border-bottom:1px solid var(--borda);padding-bottom:16px;margin-bottom:18px}
.cycle-head h2{font-size:19px;font-weight:600;color:var(--verde-escuro)}
.cycle-head .meta{font-size:12.5px;color:#6b776f;font-weight:300;margin-top:3px}
.badge-cont{font-size:12px;font-weight:600;padding:6px 14px;border-radius:20px;background:var(--cinza);color:var(--verde-escuro);white-space:nowrap}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
.kpi{background:var(--cinza);border-radius:12px;padding:14px 16px}
.kpi .lab{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#7a857d;font-weight:500}
.kpi .val{font-size:19px;font-weight:600;margin-top:4px}
.kpi .pct{font-size:11.5px;font-weight:500;margin-top:2px}
.sec-t{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--verde-medio);margin:22px 0 12px;display:flex;align-items:center;gap:8px}
.sec-t:first-of-type{margin-top:6px}
.sec-t::before{content:"";width:4px;height:15px;background:var(--verde-lima);border-radius:2px}
table{width:100%;border-collapse:collapse;font-size:13.5px;margin-bottom:4px}
th{text-align:left;font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;color:#8a938c;padding:8px 10px;border-bottom:2px solid var(--borda)}
td{padding:9px 10px;border-bottom:1px solid #eef1ee}
td.r,th.r{text-align:right}
.num{font-variant-numeric:tabular-nums;font-weight:500}
.st{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;display:inline-block}
.st.ok{background:#e7efdf;color:var(--ok)}.st.wait{background:#f5ece0;color:var(--alerta)}
.bar{height:8px;border-radius:5px;background:#e9ede9;overflow:hidden;margin-top:5px}
.bar>span{display:block;height:100%;border-radius:5px}
.bar-lab{display:flex;justify-content:space-between;font-size:12px;margin-bottom:2px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.mini{background:var(--cinza);border-radius:12px;padding:14px 16px}
.mini .lab{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#7a857d;font-weight:500}
.mini .v{font-size:17px;font-weight:600;margin-top:3px}
.mini .s{font-size:11.5px;color:#7a857d;margin-top:2px}
.chk{list-style:none;font-size:13px}
.chk li{padding:8px 0 8px 26px;position:relative;border-bottom:1px solid #eef1ee}
.chk li::before{position:absolute;left:0;top:7px;font-size:14px}
.chk li.ok::before{content:"\2714";color:var(--ok)}
.chk li.warn::before{content:"\26A0";color:var(--alerta)}
.chk li.info::before{content:"\2139";color:var(--azul)}
footer{font-size:12px;color:#6b776f;line-height:1.7;margin-top:30px;padding-top:18px;border-top:1px solid var(--borda)}
footer b{color:var(--verde-escuro)}
@media(max-width:720px){.kpis,.two{grid-template-columns:1fr}h1{font-size:23px}.ppa-logo{height:48px}}
</style></head><body>

let currentPartner=Object.keys(DADOS.parceiros)[0];
const BRL=v=>v.toLocaleString('pt-BR',{style:'currency',currency:'BRL',minimumFractionDigits:2});
const BRL0=v=>v.toLocaleString('pt-BR',{style:'currency',currency:'BRL',maximumFractionDigits:0});
const dt=s=>s?s.split('-').reverse().join('/'):'—';
document.getElementById('ger').textContent='atualizado em '+DADOS.gerado.split(' ')[0].split('-').reverse().join('/');
function pctColor(p){if(p===null)return 'var(--azul)';if(p>105)return 'var(--erro)';if(p>100)return 'var(--alerta)';return 'var(--verde-medio)';}
function bannerHTML(pd){
 const logo = pd.logo && LOGOS[pd.logo] ? `<img src="${LOGOS[pd.logo]}" alt="">` : `<div class="dowtag">DOW</div>`;
 return `<div class="banner">${logo}<div class="pl"><div class="p1">Financiador · Programa</div><div class="p2">${pd.programa}</div></div></div>`;
}
function cycleHTML(cd){
 const i=cd.info, saldoExec=cd.rec_total-cd.real_total;
 const pctReceb=i.valor?Math.round(100*cd.rec_total/i.valor):0, pctExec=cd.rec_total?Math.round(100*cd.real_total/cd.rec_total):0;
 let k=`<div class="cycle"><div class="cycle-head"><div><h2>${i.nome}</h2><div class="meta">${i.obj} · Execução ${i.exec_meses}</div></div><div class="badge-cont">Contrato ${BRL0(i.valor)}</div></div>
  <div class="kpis">
   <div class="kpi"><div class="lab">Contratado</div><div class="val">${BRL0(i.valor)}</div></div>
   <div class="kpi"><div class="lab">Recebido</div><div class="val">${BRL0(cd.rec_total)}</div><div class="pct" style="color:${pctReceb>=100?'var(--ok)':'var(--alerta)'}">${pctReceb}% do contrato</div></div>
   <div class="kpi"><div class="lab">Executado</div><div class="val">${BRL0(cd.real_total)}</div><div class="pct" style="color:var(--azul)">${pctExec}% do recebido</div></div>
   <div class="kpi"><div class="lab">Recebido a executar</div><div class="val">${BRL0(saldoExec)}</div></div>
  </div>`;
 k+=`<div class="sec-t">Recebimento das parcelas</div><table><thead><tr><th>Parcela</th><th class="r">Previsto</th><th>Data prev.</th><th class="r">Recebido</th><th>Data receb.</th><th>Status</th></tr></thead><tbody>`;
 cd.recebimento.forEach(r=>{const st=r.rec>0?'<span class="st ok">Recebido</span>':'<span class="st wait">A receber</span>';
  k+=`<tr><td><b>${r.parc}</b>${r.nota?`<div style="font-size:11px;color:#8a938c">${r.nota}</div>`:''}</td><td class="r num">${BRL(r.prev)}</td><td>${dt(r.dprev)}</td><td class="r num">${r.rec>0?BRL(r.rec):'—'}</td><td>${dt(r.drec)}</td><td>${st}</td></tr>`;});
 k+=`</tbody><tfoot><tr style="font-weight:600"><td>Total</td><td class="r num">${BRL(cd.prev_total)}</td><td></td><td class="r num">${BRL(cd.rec_total)}</td><td></td><td></td></tr></tfoot></table>`;
 k+=`<div class="sec-t">Orçado × Realizado por rubrica</div><table><thead><tr><th>Rubrica / Área</th><th class="r">Orçado</th><th class="r">Realizado</th><th class="r">Saldo</th><th style="width:200px">Execução</th></tr></thead><tbody>`;
 cd.areas.forEach(a=>{const p=a.pct,w=p===null?0:Math.min(p,100),col=pctColor(p);
  k+=`<tr><td>${a.area}</td><td class="r num">${BRL(a.orcado)}</td><td class="r num">${BRL(a.realizado)}</td><td class="r num" style="color:${a.saldo<0?'var(--erro)':'inherit'}">${BRL(a.saldo)}</td><td><div class="bar-lab"><span></span><b style="color:${col}">${p===null?'—':p.toFixed(0)+'%'}</b></div><div class="bar"><span style="width:${w}%;background:${col}"></span></div></td></tr>`;});
 const pt=cd.orc_total?100*cd.real_total/cd.orc_total:0;
 k+=`</tbody><tfoot><tr style="font-weight:600"><td>Total</td><td class="r num">${BRL(cd.orc_total)}</td><td class="r num">${BRL(cd.real_total)}</td><td class="r num">${BRL(cd.orc_total-cd.real_total)}</td><td><div class="bar-lab"><span></span><b>${pt.toFixed(0)}%</b></div><div class="bar"><span style="width:${Math.min(pt,100)}%;background:var(--verde-escuro)"></span></div></td></tr></tfoot></table>`;
 if(cd.instituicoes.length){
  k+=`<div class="sec-t">Investimento em Projetos — repasse por instituição beneficiária</div><table><thead><tr><th>Instituição</th><th class="r">Valor repassado</th><th style="width:160px">% do investimento</th></tr></thead><tbody>`;
  const mx=Math.max(...cd.instituicoes.map(x=>x.valor));
  cd.instituicoes.forEach(x=>{const pc=cd.inst_total?100*x.valor/cd.inst_total:0;
   k+=`<tr><td>${x.nome}</td><td class="r num">${BRL(x.valor)}</td><td><div class="bar-lab"><span></span><b>${pc.toFixed(1)}%</b></div><div class="bar"><span style="width:${100*x.valor/mx}%;background:var(--azul)"></span></div></td></tr>`;});
  k+=`</tbody><tfoot><tr style="font-weight:600"><td>Total repassado (${cd.instituicoes.length} instituições)</td><td class="r num">${BRL(cd.inst_total)}</td><td></td></tr></tfoot></table>`;
 }
 k+=`<div class="two"><div><div class="sec-t">Tributos &amp; contrapartidas</div>`;
 k+=`<div class="mini" style="margin-bottom:10px"><div class="lab">ITCMD / tributos recolhidos</div><div class="v">${BRL(cd.tributo.realizado)}</div><div class="s">${cd.tributo.orcado?'orçado '+BRL(cd.tributo.orcado):'sem previsão orçada'}</div></div>`;
 if(cd.contrapartida){k+=`<div class="mini"><div class="lab">Contrapartida da PPA</div><div class="v">${BRL(cd.contrapartida.valor)}</div><div class="s">${cd.contrapartida.tipo}</div></div>`;}
 else{k+=`<div class="mini"><div class="lab">Contrapartida da PPA</div><div class="v">—</div><div class="s">não prevista no contrato</div></div>`;}
 k+=`</div><div><div class="sec-t">Conformidade &amp; prazos</div><ul class="chk">`;
 cd.conformidade.forEach(c=>{k+=`<li class="${c.st}">${c.txt}</li>`;});
 k+=`</ul></div></div></div>`; return k;
}
function render(partner){
 currentPartner=partner;
 document.querySelectorAll('.tab').forEach(t=>{const on=t.dataset.p===partner;t.classList.toggle('on',on);t.style.background=on?DADOS.parceiros[t.dataset.p].cor:'#fff';});
 const pd=DADOS.parceiros[partner];let h=bannerHTML(pd);['I','II'].forEach(c=>{if(pd.ciclos[c])h+=cycleHTML(pd.ciclos[c]);});
 document.getElementById('content').innerHTML=h;
}
const tabs=document.getElementById('tabs');
Object.keys(DADOS.parceiros).forEach((p,idx)=>{const b=document.createElement('button');b.className='tab'+(idx===0?' on':'');b.dataset.p=p;b.innerHTML=`<span class="dot" style="background:${DADOS.parceiros[p].cor}"></span>${p}`;b.onclick=()=>render(p);tabs.appendChild(b);});

// ---------- EXPORTAÇÃO CLIENT-SIDE ----------
const money=n=>(n||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
function exportXLSX(){
 if(typeof XLSX==='undefined'){alert('Biblioteca de planilha ainda carregando. Tente novamente em instantes.');return;}
 const wb=XLSX.utils.book_new();
 let res=[["PPA · Gestão de Contratos de Parceria — Resumo"],["Atualizado em "+DADOS.gerado.split(' ')[0]],[],
  ["Parceiro","Ciclo","Contratado","Recebido","Executado","Recebido a executar"]];
 let gc=0,gr=0,ge=0;
 for(const p in DADOS.parceiros){const pd=DADOS.parceiros[p];for(const c in pd.ciclos){const cd=pd.ciclos[c];
   res.push([p,"Ciclo "+c,cd.info.valor,cd.rec_total,cd.real_total,cd.rec_total-cd.real_total]);gc+=cd.info.valor;gr+=cd.rec_total;ge+=cd.real_total;}}
 res.push(["TOTAL GERAL","",gc,gr,ge,gr-ge]);
 const wsR=XLSX.utils.aoa_to_sheet(res); wsR['!cols']=[{wch:16},{wch:10},{wch:16},{wch:16},{wch:16},{wch:18}];
 XLSX.utils.book_append_sheet(wb,wsR,"Resumo");
 let rec=[["Parceiro","Ciclo","Parcela","Previsto","Data prevista","Recebido","Data recebimento","Status","Observação"]];
 for(const p in DADOS.parceiros){const pd=DADOS.parceiros[p];for(const c in pd.ciclos){const cd=pd.ciclos[c];
   cd.recebimento.forEach(x=>rec.push([p,"Ciclo "+c,x.parc,x.prev,dt(x.dprev),x.rec||"",dt(x.drec),x.rec>0?"Recebido":"A receber",x.nota||""]));}}
 const wsRec=XLSX.utils.aoa_to_sheet(rec); wsRec['!cols']=[{wch:14},{wch:9},{wch:9},{wch:15},{wch:13},{wch:15},{wch:15},{wch:11},{wch:42}];
 XLSX.utils.book_append_sheet(wb,wsRec,"Recebimentos");
 let oxr=[["Parceiro","Ciclo","Rubrica / Área","Orçado","Realizado","Saldo","% Execução"]];
 for(const p in DADOS.parceiros){const pd=DADOS.parceiros[p];for(const c in pd.ciclos){const cd=pd.ciclos[c];
   cd.areas.forEach(a=>oxr.push([p,"Ciclo "+c,a.area,a.orcado,a.realizado,a.saldo,a.pct!=null?a.pct/100:""]));
   oxr.push([p,"Ciclo "+c,"Subtotal",cd.orc_total,cd.real_total,cd.orc_total-cd.real_total,""]);}}
 const wsO=XLSX.utils.aoa_to_sheet(oxr); wsO['!cols']=[{wch:14},{wch:9},{wch:30},{wch:16},{wch:16},{wch:16},{wch:12}];
 XLSX.utils.book_append_sheet(wb,wsO,"Orçado x Realizado");
 let inv=[["Parceiro","Ciclo","Instituição beneficiária","Valor repassado","% do investimento"]];
 for(const p in DADOS.parceiros){const pd=DADOS.parceiros[p];for(const c in pd.ciclos){const cd=pd.ciclos[c];
   if(!cd.instituicoes.length)continue;
   cd.instituicoes.forEach(x=>inv.push([p,"Ciclo "+c,x.nome,x.valor,cd.inst_total?x.valor/cd.inst_total:0]));
   inv.push([p,"Ciclo "+c,"Total",cd.inst_total,1]);}}
 const wsI=XLSX.utils.aoa_to_sheet(inv); wsI['!cols']=[{wch:14},{wch:9},{wch:52},{wch:18},{wch:16}];
 XLSX.utils.book_append_sheet(wb,wsI,"Investimento Instituições");
 XLSX.writeFile(wb,"Gestao_Contratos_PPA.xlsx");
}
function exportPDF(partner){
 if(!window.jspdf){alert('Biblioteca de PDF ainda carregando. Tente novamente em instantes.');return;}
 const {jsPDF}=window.jspdf; const doc=new jsPDF({unit:'pt',format:'a4'});
 const pd=DADOS.parceiros[partner]; const M=40; let y=44;
 doc.setFont('helvetica','bold'); doc.setFontSize(15); doc.setTextColor(0,60,55);
 doc.text('Relatório Executivo de Prestação de Contas — '+partner,M,y); y+=15;
 doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(120);
 doc.text('PPA · '+pd.programa+' · atualizado em '+dt(DADOS.gerado.split(' ')[0]),M,y);
 doc.setDrawColor(178,200,75); doc.setLineWidth(2); doc.line(M,y+6,555,y+6); y+=18;
 const head=[[0,60,55]];
 for(const c of ['I','II']){ const cd=pd.ciclos[c]; if(!cd)continue; const i=cd.info;
   if(y>720){doc.addPage();y=44;}
   doc.setFont('helvetica','bold'); doc.setFontSize(12); doc.setTextColor(0,60,55); doc.text(i.nome,M,y); y+=13;
   doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor(90);
   const pr=i.valor?Math.round(100*cd.rec_total/i.valor):0, pe=cd.rec_total?Math.round(100*cd.real_total/cd.rec_total):0;
   doc.text('Contratado R$ '+money(i.valor)+'  ·  Recebido R$ '+money(cd.rec_total)+' ('+pr+'%)  ·  Executado R$ '+money(cd.real_total)+' ('+pe+'% do recebido)',M,y); y+=6;
   doc.autoTable({startY:y+4,head:[['Parcela','Previsto','Data prev.','Recebido','Data receb.','Status']],
     body:cd.recebimento.map(x=>[x.parc,'R$ '+money(x.prev),dt(x.dprev),x.rec>0?'R$ '+money(x.rec):'—',dt(x.drec),x.rec>0?'Recebido':'A receber']),
     foot:[['Total','R$ '+money(cd.prev_total),'','R$ '+money(cd.rec_total),'','']],
     styles:{fontSize:8,cellPadding:3},headStyles:{fillColor:[0,60,55]},footStyles:{fillColor:[244,246,244],textColor:[30,40,35],fontStyle:'bold'},
     columnStyles:{1:{halign:'right'},3:{halign:'right'}},margin:{left:M,right:M}});
   y=doc.lastAutoTable.finalY+12;
   doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(73,109,58); doc.text('Orçado × Realizado por rubrica',M,y); y+=2;
   doc.autoTable({startY:y+4,head:[['Rubrica / Área','Orçado','Realizado','Saldo','% Exec.']],
     body:cd.areas.map(a=>[a.area,'R$ '+money(a.orcado),'R$ '+money(a.realizado),'R$ '+money(a.saldo),a.pct!=null?a.pct.toFixed(0)+'%':'—']),
     foot:[['Total','R$ '+money(cd.orc_total),'R$ '+money(cd.real_total),'R$ '+money(cd.orc_total-cd.real_total),(cd.orc_total?Math.round(100*cd.real_total/cd.orc_total):0)+'%']],
     styles:{fontSize:8,cellPadding:3},headStyles:{fillColor:[0,60,55]},footStyles:{fillColor:[244,246,244],textColor:[30,40,35],fontStyle:'bold'},
     columnStyles:{1:{halign:'right'},2:{halign:'right'},3:{halign:'right'},4:{halign:'right'}},margin:{left:M,right:M}});
   y=doc.lastAutoTable.finalY+12;
   if(cd.instituicoes.length){
     if(y>680){doc.addPage();y=44;}
     doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(73,109,58); doc.text('Investimento em Projetos — repasse por instituição',M,y); y+=2;
     doc.autoTable({startY:y+4,head:[['Instituição beneficiária','Valor repassado','%']],
       body:cd.instituicoes.map(x=>[x.nome,'R$ '+money(x.valor),(100*x.valor/cd.inst_total).toFixed(1)+'%']),
       foot:[['Total ('+cd.instituicoes.length+' instituições)','R$ '+money(cd.inst_total),'100%']],
       styles:{fontSize:8,cellPadding:3},headStyles:{fillColor:[0,60,55]},footStyles:{fillColor:[244,246,244],textColor:[30,40,35],fontStyle:'bold'},
       columnStyles:{1:{halign:'right'},2:{halign:'right'}},margin:{left:M,right:M}});
     y=doc.lastAutoTable.finalY+12;
   }
   if(y>700){doc.addPage();y=44;}
   doc.setFont('helvetica','bold'); doc.setFontSize(10); doc.setTextColor(73,109,58); doc.text('Tributos, contrapartidas e conformidade',M,y); y+=13;
   doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor(40);
   const cptxt=cd.contrapartida?('R$ '+money(cd.contrapartida.valor)+' ('+cd.contrapartida.tipo+')'):'não prevista';
   doc.text('• ITCMD / tributos recolhidos: R$ '+money(cd.tributo.realizado)+(cd.tributo.orcado?' (orçado R$ '+money(cd.tributo.orcado)+')':''),M,y); y+=12;
   doc.text('• Contrapartida da PPA: '+cptxt,M,y); y+=12;
   cd.conformidade.forEach(cf=>{ if(y>780){doc.addPage();y=44;} doc.text('• '+cf.txt,M,y,{maxWidth:515}); y+=12; });
   y+=8;
 }
 doc.save('Relatorio_Executivo_'+partner+'.pdf');
}
